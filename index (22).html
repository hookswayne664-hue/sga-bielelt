<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --bd:#30363d;--bd2:#444c56;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --bl:#1f6feb;--bl2:#388bfd;--gr:#3fb950;--rd:#f85149;--or:#d29922;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
/* LOGIN */
.lpage{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%,#1a2f4e 0%,#0d1117 70%)}
.lbox{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:40px;width:400px;
  box-shadow:0 16px 64px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:32px;font-weight:800;color:var(--bl2);letter-spacing:3px}
.logo p{color:var(--tx2);font-size:13px;margin-top:5px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg select,.fg input[type=text],.fg input[type=password]{width:100%;padding:10px 12px;background:var(--bg3);
  border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:14px}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--bl)}
.lbtn{width:100%;padding:12px;background:var(--bl);color:#fff;border:none;border-radius:6px;
  font-size:15px;font-weight:700;cursor:pointer}
.lbtn:hover{background:var(--bl2)}
.lerr{text-align:center;color:var(--rd);font-size:13px;margin-top:8px;min-height:18px}
/* NAVBAR */
.nav{background:var(--bg2);border-bottom:1px solid var(--bd);height:52px;display:flex;
  align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
.navbrand{font-size:16px;font-weight:800;color:var(--bl2);letter-spacing:1px}
.navr{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--tx2)}
.obtn{background:var(--bg3);color:var(--tx);border:1px solid var(--bd);padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px}
.obtn:hover{border-color:var(--bd2)}
.nbadge{background:var(--rd);color:#fff;border-radius:8px;padding:1px 6px;font-size:11px;font-weight:700}
/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;padding:0 16px;overflow-x:auto;
  position:sticky;top:52px;z-index:99}
.tab{padding:12px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);
  border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--bl2);border-bottom-color:var(--bl2)}
.tbadge{background:var(--rd);color:#fff;border-radius:8px;padding:1px 5px;font-size:11px;margin-left:4px}
/* CONTENT */
.con{max-width:1100px;margin:0 auto;padding:20px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:20px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.sub{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:14px;margin-bottom:12px}
.sub h3{font-size:12px;font-weight:700;color:var(--bl2);margin-bottom:10px;text-transform:uppercase}
/* FORM */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fr.one{grid-template-columns:1fr}
.fi{display:block}
.fi label{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:500}
.fi input,.fi select,.fi textarea{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--bd);
  border-radius:5px;color:var(--tx);font-size:13px}
.fi input:focus,.fi select:focus,.fi textarea:focus{outline:none;border-color:var(--bl)}
.fi input[type=number]{text-align:right}
.fi textarea{resize:vertical;min-height:54px}
.fi input:disabled{opacity:.4}
/* BUTTONS */
.btn{padding:7px 14px;border:none;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.bp{background:var(--bl);color:#fff}
.bs{background:#1a4731;color:var(--gr);border:1px solid #2d6a4f}
.bd_{background:#3d1a1a;color:var(--rd);border:1px solid #6b2c2c}
.bw{background:#3d2e0a;color:var(--or);border:1px solid #6b500a}
.bi{background:#1a2f4e;color:var(--bl2);border:1px solid #1f4070}
.bx{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
/* PERIOD TABS */
.ptabs{display:flex;gap:6px;margin-bottom:14px}
.pt{padding:5px 13px;border:1px solid var(--bd);border-radius:14px;cursor:pointer;font-size:12px;
  font-weight:600;color:var(--tx2);transition:all .15s}
.pt.on{border-color:var(--bl);background:rgba(31,111,235,.15);color:var(--bl2)}
/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--tx2);
  border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle;font-size:13px}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.bok{background:rgba(63,185,80,.15);color:var(--gr)}
.bfail{background:rgba(248,81,73,.15);color:var(--rd)}
.bwarn{background:rgba(210,153,34,.15);color:var(--or)}
/* STATS */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:14px 18px;
  flex:1;min-width:110px;border-left:3px solid var(--bl)}
.sc.g{border-left-color:var(--gr)}.sc.r{border-left-color:var(--rd)}.sc.o{border-left-color:var(--or)}
.sc .n{font-size:26px;font-weight:800}
.sc.g .n{color:var(--gr)}.sc.r .n{color:var(--rd)}.sc.o .n{color:var(--or)}
.sc .l{font-size:11px;color:var(--tx2);margin-top:2px}
/* CHAT */
.cbox{height:340px;overflow-y:auto;background:var(--bg3);border:1px solid var(--bd);
  border-radius:6px;padding:14px;display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.msg{max-width:72%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5}
.msg.mine{align-self:flex-end;background:rgba(31,111,235,.25);border:1px solid rgba(31,111,235,.4)}
.msg.other{align-self:flex-start;background:var(--bg2);border:1px solid var(--bd)}
.msg.ann{align-self:center;background:rgba(210,153,34,.12);border:1px solid rgba(210,153,34,.3);
  color:var(--or);text-align:center;max-width:90%;border-radius:6px}
.msender{font-size:11px;color:var(--bl2);font-weight:700;margin-bottom:3px}
.mtime{font-size:10px;color:var(--tx3);margin-top:3px}
.cinp{display:flex;gap:8px}
.cinp input{flex:1;padding:9px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:13px}
.cinp input:focus{outline:none;border-color:var(--bl)}
/* AI */
.aio{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:16px;
  white-space:pre-wrap;font-size:13px;line-height:1.8}
.ail{text-align:center;color:var(--tx2);padding:32px}
/* ARCHIVE */
.ai{border:1px solid var(--bd);border-radius:6px;padding:10px 14px;margin-bottom:6px;cursor:pointer}
.ai:hover{border-color:var(--bl)}
.am{font-size:11px;color:var(--tx3);margin-top:3px}
/* PROGRESS */
.pb{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:3px}
.pf{height:100%;background:var(--gr);border-radius:3px}
/* UNIT ROW */
.urow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.uc{font-weight:700;color:var(--bl2);font-size:12px;min-width:62px}
.un{flex:1;font-size:13px}
.us{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600}
.uon{background:rgba(63,185,80,.15);color:var(--gr)}
.uoff{background:rgba(248,81,73,.15);color:var(--rd)}
.pi{width:88px;padding:4px 7px;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px}
/* IND GRID */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:6px;font-size:13px;
  font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;
  background:var(--bg2);border:1px solid var(--bd);color:var(--tx)}
.toast.show{opacity:1}
.ts{background:rgba(63,185,80,.15);border-color:var(--gr);color:var(--gr)}
.te{background:rgba(248,81,73,.15);border-color:var(--rd);color:var(--rd)}
.app{display:none}
.empty{text-align:center;padding:32px;color:var(--tx3)}
@media(max-width:600px){.fr{grid-template-columns:1fr}.ig{grid-template-columns:1fr}}
</style>
</head>

// API
async function api(a,p={}){
  const u=new URL(SU);u.searchParams.set("action",a);
  for(const[k,v]of Object.entries(p))u.searchParams.set(k,typeof v==="object"?JSON.stringify(v):v);
  try{const r=await fetch(u);const t=await r.text();try{return JSON.parse(t)}catch{return{ok:true}}}catch{return{ok:false}}
}

// FIREBASE
async function initFB(){
  try{
    const{initializeApp}=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
    const{getDatabase,ref,push,onValue,get,set}=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
    const app=initializeApp(FC);fbDB=getDatabase(app);
    window._r=ref;window._p=push;window._ov=onValue;window._get=get;window._set=set;
  }catch(e){}
}

// Firebase-аас нууц үг татах
async function loadPwdsFromFB(){
  if(!fbDB||!window._get)return;
  try{
    const snap=await window._get(window._r(fbDB,"passwords"));
    if(snap.exists()){
      const fbPwds=snap.val();
      Object.assign(S.pwds,fbPwds);
      try{localStorage.setItem("sga_p",JSON.stringify(S.pwds));}catch{}
    }
  }catch(e){}
}

// Firebase-д нууц үг хадгалах
async function savePwdFB(code,pwd){
  if(!fbDB||!window._set)return false;
  try{
    await window._set(window._r(fbDB,"passwords/"+code),pwd);
    return true;
  }catch(e){return false;}
}

// PERIODS
function getPer(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth()+1;
  const wks=[],mns=[],qrs=[];
  for(let i=0;i<8;i++){const d=new Date(now);d.setDate(d.getDate()-i*7);
    wks.push(`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} 7 хоног`);}
  for(let i=0;i<6;i++){let mm=m-i,yy=y;if(mm<=0){mm+=12;yy--;}mns.push(`${yy} оны ${mm}-р сар`);}
  for(let i=0;i<4;i++){let q=Math.ceil(m/3)-i,yy=y;if(q<=0){q+=4;yy--;}qrs.push(`${yy} оны ${q}-р улирал`);}
  return{wks,mns,qrs};
}

// LOGIN
async function initLogin(){
  const sel=document.getElementById("lC");
  S.units.filter(u=>!u.disabled).forEach(u=>{
    const o=document.createElement("option");o.value=u.code;
    o.textContent=u.code+" — "+u.name;sel.appendChild(o);
  });
  // Нууц үгийн талбарыг цэвэрлэх
  const pf=document.getElementById("lP");pf.value="";
  setTimeout(()=>{pf.value="";},200);
  pf.onkeydown=e=>{if(e.key==="Enter")doLogin();};
  // localStorage-аас нууц үг
  try{const lp=localStorage.getItem("sga_p");if(lp)Object.assign(S.pwds,JSON.parse(lp));}catch{}
  // Серверээс нууц үг
  try{
    const r=await api("getPasswords");
    if(r&&r.passwords){
      if(r.passwords.__ALL__){const ap=r.passwords.__ALL__;
        S.units.filter(u=>!u.isAdmin).forEach(u=>{S.pwds[u.code]=S.pwds[u.code]||ap;});}
      Object.entries(r.passwords).forEach(([k,v])=>{if(k!=="__ALL__")S.pwds[k]=v;});
      try{localStorage.setItem("sga_p",JSON.stringify(S.pwds));}catch{}
    }
  }catch{}
  // Firebase холбогдсоны дараа нууц үг татах
  initFB().then(()=>loadPwdsFromFB());
  const btn=document.getElementById("lB");btn.textContent="Нэвтрэх →";
  pf.value="";
}

function doLogin(){
  const code=document.getElementById("lC").value;
  const pwd=document.getElementById("lP").value;
  const err=document.getElementById("lE");err.textContent="";
  if(!code){err.textContent="Нэгжээ сонгоно уу!";return;}
  if(!pwd){err.textContent="Нууц үг оруулна уу!";return;}
  const u=S.units.find(x=>x.code===code);
  if(!u){err.textContent="Нэгж олдсонгүй!";return;}
  if(u.disabled){err.textContent="Таны эрх хаагдсан байна!";return;}
  // Firebase > localStorage > DEF_UNITS дарааллаар шалгах
  const cp=S.pwds[code]||u.pwd;
  if(pwd!==cp){err.textContent="Нууц үг буруу байна! (зөв нууц үг: "+cp+")";
    // Debug: зөв нууц үгийг харуулах (дараа нь хасна)
    setTimeout(()=>{err.textContent="Нууц үг буруу байна!";},3000);
    return;}
  S.user=u;
  document.getElementById("LP").style.display="none";
  document.getElementById("AP").style.display="block";
  document.getElementById("nU").textContent=u.code+" · "+u.name;
  const first=u.isAdmin?"monitor":"data";
  renderTabs();renderTab(first);initFB();
}

}

function lChat(){
  if(!fbDB||!window._ov)return;
  window._ov(window._r(fbDB,"messages"),snap=>{
    const el=document.getElementById("CB");if(!el)return;
    const msgs=[];snap.forEach(c=>msgs.push({id:c.key,...c.val()}));
    if(!msgs.length){el.innerHTML='<div class="empty">Мессеж байхгүй</div>';return;}
    el.innerHTML=msgs.slice(-60).map(m=>{
      const mine=m.sender===S.user?.code,ann=m.type==="announce";
      return`<div class="msg ${ann?"ann":mine?"mine":"other"}">
        ${!mine&&!ann?`<div class="msender">${m.senderName||m.sender}</div>`:""}
        ${ann?"📢 "+m.senderName+": ":""}${m.text}
        <div class="mtime">${m.time||""}</div></div>`;
    }).join("");
    el.scrollTop=el.scrollHeight;
    if(S.tab!=="chat"){S.unread++;uBadge(S.unread);}
  });
}

function lMon(){
  const per=document.getElementById("mP")?.value;
  const grp=document.getElementById("mG")?.value||"all";
  const NIISLEL=["ШГА01","ШГА02","ШГА03","ШГА04","ШГА05","ШГА06","ШГА07","ШГА08","ШГА09","ШГА10","ШГА11","ШГА12","ШГА13","ШГА14"];
  let active=S.units.filter(u=>!u.isAdmin&&!u.disabled);
  if(grp==="niislel")active=active.filter(u=>NIISLEL.includes(u.code));
  else if(grp==="bank")active=active.filter(u=>u.name.includes("Банк"));
  else if(grp==="aimag")active=active.filter(u=>u.name.includes("аймаг"));
  const sub=new Set(S.data.filter(d=>d.period===per).map(d=>d.unit));
  const done=active.filter(u=>sub.has(u.code));
  const miss=active.filter(u=>!sub.has(u.code));
  const pct=active.length?Math.round(done.length/active.length*100):0;
  const rows=active.map(u=>{
    const e=S.data.find(d=>d.unit===u.code&&d.period===per);
    return`<tr><td><b>${u.code}</b></td><td>${u.name}</td>

  }).join("");

  el.innerHTML=`<div class="stats">
    <div class="sc"><div class="n">${active.length}</div><div class="l">Нийт нэгж</div></div>
    <div class="sc g"><div class="n">${done.length}</div><div class="l">✅ Илгээсэн</div></div>
    <div class="sc r"><div class="n">${miss.length}</div><div class="l">❌ Илгээгээгүй</div></div>
    <div class="sc o"><div class="n">${pct}%</div><div class="l">Хамрагдалт</div></div>

  <button class="btn bw" style="margin-top:8px" onclick="nMiss()">📢 Мэдэгдэл явуулах</button>`:"<div style='margin-top:8px;color:var(--gr);font-size:13px'>✅ Бүх нэгж илгээсэн байна!</div>"}`;
}
function lPlanCov(){
  const plan=document.getElementById("mPl")?.value;
  const per=document.getElementById("mPP")?.value;
  const inds=S.inds.filter(i=>i.plans&&i.plans.includes(plan));
  const el=document.getElementById("pRes");if(!el)return;
  if(!inds.length){el.innerHTML='<div class="empty">Энэ төлөвлөгөөнд үзүүлэлт тохируулагдаагүй байна.<br>⚙️ Тохиргоо → Шалгуур үзүүлэлт → Нэмэх</div>';return;}
  const active=S.units.filter(u=>!u.isAdmin&&!u.disabled);
  let tot=0,filled=0;
  const rows=active.map(u=>{
    const e=S.data.find(d=>d.unit===u.code&&d.period===per);
    const f=inds.filter(i=>e&&e.values&&e.values[i.id]).length;
    tot+=inds.length;filled+=f;
    const pct=Math.round(f/inds.length*100);
    return`<tr><td><b>${u.code}</b></td><td>${u.name}</td>
    <td>${f}/${inds.length}</td>
    <td><div class="pb"><div class="pf" style="width:${pct}%"></div></div><span style="font-size:11px">${pct}%</span></td>
    <td>${e?'<span class="badge bok">✅</span>':'<span class="badge bfail">❌</span>'}</td></tr>`;
  }).join("");
  const oPct=tot?Math.round(filled/tot*100):0;
  el.innerHTML=`<div style="margin-bottom:10px;font-size:13px">
    <b style="color:var(--bl2)">${plan}</b> — Нийт хамрагдалт: <b style="color:${oPct>=80?"var(--gr)":"var(--or)"}">${oPct}%</b>
    (${filled}/${tot} үзүүлэлт дүүрсэн)</div>
  <div class="tw"><table><tr><th>Код</th><th>Нэгж</th><th>Дүүрсэн</th><th>Явц</th><th></th></tr>${rows}</table></div>`;
}

async function gAI(){
  const plan=document.getElementById("aP").value;
  const per=document.getElementById("aPer").value;
  const extra=document.getElementById("aEx").value;
  const out=document.getElementById("aRes");
  out.innerHTML='<div class="ail">⏳ AI бичиж байна...</div>';
  const ri=S.inds.filter(i=>i.plans&&i.plans.includes(plan));
  const agg={};
  S.units.filter(u=>!u.isAdmin).forEach(u=>{
    const e=S.data.find(d=>d.unit===u.code&&d.period===per);
    if(e)ri.forEach(i=>{if(e.values[i.id]){if(!agg[i.id])agg[i.id]={name:i.name,type:i.type,vals:[]};agg[i.id].vals.push(e.values[i.id]);}});
  });
  const lines=Object.values(agg).map(g=>{
    const nums=g.vals.map(v=>parseFloat(v)).filter(n=>!isNaN(n));
    if(g.type==="text")return`${g.name}: ${g.vals.join("; ")}`;
    if(g.type==="pct"&&nums.length)return`${g.name}: дундаж ${(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1)}%`;
    if(nums.length)return`${g.name}: нийт ${nums.reduce((a,b)=>a+b,0).toLocaleString("en-US")} (${nums.length} нэгжийн нийлбэр)`;
    return`${g.name}: ${g.vals.join(", ")}`;
  }).join("\n");
  const prompt=`Та Шүүхийн шийдвэр гүйцэтгэх байгууллагын "${plan}" биелэлтийг монгол хэлээр бичнэ үү.\n\nТайлант хугацаа: ${per}\n\nЦугласан тоон мэдээ (${S.units.filter(u=>!u.isAdmin).length} нэгжээс):\n${lines||"(мэдээ байхгүй)"}\n\n${extra?`Загвар / нэмэлт мэдээлэл:\n${extra}\n\n`:""}Биелэлтийг албан ёсны хэлбэрт мэргэжлийн байдлаар бичнэ үү.`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    aiTxt=d.content?.[0]?.text||"Алдаа гарлаа";
    out.innerHTML=`<div class="aio">${aiTxt}</div><div class="brow">
      <button class="btn bs" onclick="archAI()">✅ Архивлах</button>
      <button class="btn bi" onclick="prtAI()">🖨️ Хэвлэх</button>
      <button class="btn bx" onclick="navigator.clipboard.writeText(aiTxt).then(()=>toast('Хуулагдлаа','ts'))">📋 Хуулах</button>
    </div>`;
  }catch(e){out.innerHTML=`<div class="aio">Алдаа: ${e.message}</div>`;}
}

}
