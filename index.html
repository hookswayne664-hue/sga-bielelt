function fP(v){const n=parseFloat(v);return isNaN(n)?"":(n.toFixed(1)+"%");}
function fV(v,t){
  if(v===undefined||v===null||v==="")return"";
  if(t==="money")return fN(v)+"₮";
  if(t==="pct")return fP(v);
  if(t==="text")return v;

// ---- TOAST ----
function toast(msg,cls){
  const t=document.getElementById("tst");
  t.textContent=msg;t.className="toast show "+(cls||"");
  clearTimeout(t._t);t._t=setTimeout(()=>{t.className="toast";},3000);
}

// ---- API ----
async function api(a,p){
  const u=new URL(SU);u.searchParams.set("action",a);
  if(p)for(const[k,v]of Object.entries(p))u.searchParams.set(k,typeof v==="object"?JSON.stringify(v):v);
  try{const r=await fetch(u);const t=await r.text();try{return JSON.parse(t);}catch{return{ok:true};}}catch{return{ok:false};}
}

// ---- FIREBASE ----
async function initFB(){
  try{
    const{initializeApp}=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
    const{getDatabase,ref,push,onValue,get,set}=await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");
    const app=initializeApp(FC);fbDB=getDatabase(app);
    window._r=ref;window._p=push;window._ov=onValue;window._get=get;window._set=set;
    loadFBPwds();
  }catch(e){}
}
async function loadFBPwds(){
  if(!fbDB||!window._get)return;
  try{const snap=await window._get(window._r(fbDB,"passwords"));if(snap.exists()){Object.assign(S.pwds,snap.val());try{localStorage.setItem("sga_p",JSON.stringify(S.pwds));}catch{}}}catch{}
}
async function savePwdFB(code,pwd){
  if(!fbDB||!window._set)return false;
  try{await window._set(window._r(fbDB,"passwords/"+code),pwd);return true;}catch{return false;}
}

// ---- PERIODS ----
function getPer(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1;
  const w=[],mn=[],q=[];
  for(let i=0;i<8;i++){const d=new Date(n);d.setDate(d.getDate()-i*7);w.push(d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0")+" 7 хоног");}
  for(let i=0;i<6;i++){let mm=m-i,yy=y;if(mm<=0){mm+=12;yy--;}mn.push(yy+" оны "+mm+"-р сар");}
  for(let i=0;i<4;i++){let qq=Math.ceil(m/3)-i,yy=y;if(qq<=0){qq+=4;yy--;}q.push(yy+" оны "+qq+"-р улирал");}
  return{w,mn,q};
}

async function loadAllData(){
  try{
    const r=await api("getAllData");
    if(r&&r.data&&r.data.length){
      r.data.forEach(entry=>{
        const idx=S.data.findIndex(d=>d.unit===entry.unit&&d.period===entry.period);
        if(idx>=0)S.data[idx]=entry;else S.data.push(entry);
      });
      toast("☁️ "+r.data.length+" мэдээ ачаалагдлаа","ts");
    }
  }catch(e){}
}
async function initLogin(){
  const sel=document.getElementById("lC");
  S.units.filter(u=>!u.disabled).forEach(u=>{
    const o=document.createElement("option");o.value=u.code;o.textContent=u.code+" — "+u.name;sel.appendChild(o);
  });
  const pf=document.getElementById("lP");pf.value="";setTimeout(()=>{pf.value="";},200);
  pf.onkeydown=e=>{if(e.key==="Enter")doLogin();};
  try{const lp=localStorage.getItem("sga_p");if(lp)Object.assign(S.pwds,JSON.parse(lp));}catch{}
  try{
    const r=await api("getPasswords");
    if(r&&r.passwords){
      if(r.passwords.__ALL__){const ap=r.passwords.__ALL__;S.units.filter(u=>!u.isAdmin).forEach(u=>{S.pwds[u.code]=S.pwds[u.code]||ap;});}
      Object.entries(r.passwords).forEach(([k,v])=>{if(k!=="__ALL__")S.pwds[k]=v;});
      try{localStorage.setItem("sga_p",JSON.stringify(S.pwds));}catch{}
    }
  }catch{}
  document.getElementById("lB").textContent="Нэвтрэх →";
  pf.value="";
}

function doLogin(){
  const code=document.getElementById("lC").value;
  const pwd=document.getElementById("lP").value;
  const err=document.getElementById("lE");err.textContent="";
  if(!code){err.textContent="Нэгжээ сонгоно уу!";return;}
  if(!pwd){err.textContent="Нууц үг оруулна уу!";return;}
  const u=S.units.find(x=>x.code===code);
  if(!u){err.textContent="Нэгж олдсонгүй!";return;}
  if(u.disabled){err.textContent="Таны эрх хаагдсан байна!";return;}
  const cp=S.pwds[code]||u.pwd;
  if(pwd!==cp){err.textContent="Нууц үг буруу байна!";return;}
  S.user=u;
  document.getElementById("LP").style.display="none";
  document.getElementById("AP").style.display="block";
  document.getElementById("nU").textContent=u.code+" · "+u.name;
  renderTabs();renderTab(u.isAdmin?"monitor":"data");initFB();
  if(u.isAdmin)setTimeout(loadAllData,1500);
}

function logout(){
  S.user=null;
  document.getElementById("LP").style.display="flex";
  document.getElementById("AP").style.display="none";
  document.getElementById("lP").value="";
  document.getElementById("lE").textContent="";
}

  const inds=S.inds.filter(i=>i.freq===dFreq);
  const entry=S.data.find(d=>d.unit===S.user.code&&d.period===dPer)||{values:{}};
  c.innerHTML="";
  const card=mk("div","card");

  const pt=mk("div","ptabs");
  [["week","7 Хоног"],["month","Сар бүр"],["quarter","Улирал бүр"]].forEach(([f,l])=>{
    const d=mk("div","pt"+(dFreq===f?" on":""));d.textContent=l;d.onclick=()=>sDF(f);pt.appendChild(d);
  });

  // Period + unit selects
  const fr=mk("div","fr");
  const fi1=mk("div","fi");fi1.innerHTML="<label>Тайлант хугацаа</label>";
  const sel=mk("select");ps.forEach(p=>{const o=mk("option");o.value=p;o.textContent=p;if(p===dPer)o.selected=true;sel.appendChild(o);});
  sel.onchange=()=>{dPer=sel.value;rII(card,entry);};
  fi1.appendChild(sel);fr.appendChild(fi1);
  const fi2=mk("div","fi");fi2.innerHTML="<label>Нэгж</label><input value='"+S.user.name+"' disabled>";
  fr.appendChild(fi2);card.appendChild(fr);
  // Indicators grouped by plan
  if(!inds.length){card.innerHTML+="<div class='empty'>Үзүүлэлт байхгүй байна</div>";}
  else{
    const groups={};
    inds.forEach(i=>{const pl=(i.plans&&i.plans[0])||"Бусад";if(!groups[pl])groups[pl]=[];groups[pl].push(i);});
    Object.entries(groups).forEach(([pl,pInds])=>{
      const sub=mk("div","sub");sub.innerHTML="<h3>"+pl+"</h3>";
      const ig=mk("div","ig");
      pInds.forEach(i=>{
        const fi=mk("div","fi");
        const lbl=mk("label");lbl.textContent=i.name;fi.appendChild(lbl);
        const val=entry.values[i.id]||"";
        if(i.type==="text"){
          const ta=mk("textarea");ta.id="v_"+i.id;ta.value=val;fi.appendChild(ta);
        }else{
          const inp=mk("input");inp.type="text";inp.id="v_"+i.id;inp.style.textAlign="right";
          inp.placeholder="0";inp.value=val?fN(val):"";
          inp.oninput=()=>fmtInput(inp);
          fi.appendChild(inp);
        }
        ig.appendChild(fi);
      });
      sub.appendChild(ig);card.appendChild(sub);
    });
  }
  // Buttons
  const br=mk("div","brow");
  const b1=mk("button","btn bp");b1.textContent="✅ Мэдээ илгээх";b1.onclick=subData;
  const b2=mk("button","btn bi");b2.textContent="🖨️ Хэвлэх";b2.onclick=prtCur;
  br.appendChild(b1);br.appendChild(b2);card.appendChild(br);
  c.appendChild(card);
}
