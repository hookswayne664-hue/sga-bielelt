function getPer(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1;
  const w=[],mn=[],q=[];
  for(let i=0;i<8;i++){const d=new Date(n);d.setDate(d.getDate()-i*7);w.push(d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0")+" 7 хоног");}
  for(let i=0;i<6;i++){let mm=m-i,yy=y;if(mm<=0){mm+=12;yy--;}mn.push(yy+" оны "+mm+"-р сар");}
  for(let i=0;i<4;i++){let qq=Math.ceil(m/3)-i,yy=y;if(qq<=0){qq+=4;yy--;}q.push(yy+" оны "+qq+"-р улирал");}
  return{w,mn,q};
}

function doLogin(){
  const code=document.getElementById("lC").value,pwd=document.getElementById("lP").value;
  const err=document.getElementById("lE");err.textContent="";
  if(!code){err.textContent="Нэгжээ сонгоно уу!";return;}
  if(!pwd){err.textContent="Нууц үг оруулна уу!";return;}
  const u=S.units.find(x=>x.code===code);
  if(!u||u.disabled){err.textContent="Нэгж олдсонгүй эсвэл хаалттай!";return;}
  if(pwd!==(S.pwds[code]||u.pwd)){err.textContent="Нууц үг буруу байна!";return;}
  S.user=u;

  document.getElementById("AP").style.display="block";
  document.getElementById("nU").textContent=u.code+" · "+u.name;

}

function lMon(){

function lSum(){
  const per=document.getElementById("sP")?.value,plan=document.getElementById("sPl")?.value||"all";if(!per)return;

  const entries=S.data.filter(d=>d.period===per);

  const sub=new Set(entries.map(e=>e.unit)).size;
  let h="<div class='stats'><div class='sc'><div class='n'>"+totalU+"</div><div class='l'>Нийт нэгж</div></div><div class='sc g'><div class='n'>"+sub+"</div><div class='l'>✅ Илгээсэн</div></div><div class='sc r'><div class='n'>"+(totalU-sub)+"</div><div class='l'>❌ Илгээгээгүй</div></div></div>";

  h+="<div class='tw'><table><tr><th>ID</th><th>Үзүүлэлт</th><th style='text-align:right'>Нийт / Дундаж</th><th>Бөглөлт</th></tr>";
  inds.forEach(ind=>{
    const vals=entries.map(e=>e.values[ind.id]).filter(v=>v!==undefined&&v!==null&&v!=="");
    const nums=vals.map(v=>parseFloat((v+"").replace(/,/g,""))).filter(n=>!isNaN(n));
    let total="—";
    if(ind.type==="text")total=vals.length?vals.length+" хариу":"—";
    else if(ind.type==="pct"&&nums.length)total=(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1)+"%";
    else if(nums.length)total="<b>"+fN(nums.reduce((a,b)=>a+b,0))+"</b>";
    const fc=vals.length,pct=sub?Math.round(fc/sub*100):0;
    h+="<tr><td style='font-size:12px;color:var(--tx2)'>"+ind.id+"</td><td>"+ind.name+"</td><td style='text-align:right;font-size:15px'>"+total+"</td><td><span style='font-size:12px;color:"+(fc>0?"var(--gr)":"var(--rd)")+"'>"+fc+"/"+sub+"</span> <div class='pb' style='width:60px;display:inline-block;vertical-align:middle'><div class='pf' style='width:"+pct+"%'></div></div></td></tr>";
  });
  h+="</table></div>";
  if(!entries.length)h+="<div class='empty' style='margin-top:12px'>Энэ хугацаанд мэдээ байхгүй байна</div>";
  document.getElementById("sRes").innerHTML=h;

async function gAI(){

  const out=document.getElementById("aRes");out.innerHTML="<div style='text-align:center;color:var(--tx2);padding:32px'>⏳ AI бичиж байна...</div>";

  let fileData="";

      const snap=await window._get(window._r(fbDB,"files/"+fkey));

        Object.entries(f.sheets||{}).forEach(([sn,rows])=>{
          fileData+="Sheet: "+sn+"\n";
          rows.slice(0,50).forEach(row=>{fileData+=row.filter(v=>v!=="").join(" | ")+"\n";});
        });
      }
    }catch{}
  }
  const lines=Object.values(agg).map(g=>{const nums=g.vals.map(v=>parseFloat((v+"").replace(/,/g,""))).filter(n=>!isNaN(n));if(g.type==="text")return g.name+": "+g.vals.join("; ");if(nums.length)return g.name+": нийт "+nums.reduce((a,b)=>a+b,0).toLocaleString("en-US");return g.name+": "+g.vals.join(", ");}).join("\n");
  const prompt="Шүүхийн шийдвэр гүйцэтгэх байгууллагын \""+plan+"\" биелэлтийг монгол хэлээр бичнэ үү.\n\nТайлант хугацаа: "+per+"\n\nЦугласан тоон мэдээ:\n"+(lines||"(мэдээ байхгүй)")+"\n\n"+(extra?"Өмнөх биелэлтийн загвар:\n"+extra+"\n\n":"")+(fileData)+"\n\nЧУХАЛ ШААРДЛАГА: Markdown (#, ##, **, __, ---, |) тэмдэгт огт ашиглахгүй. Зөвхөн цэвэр монгол текстээр, Монгол улсын албан хэрэг хөтлөлтийн стандарт MNS 5140:2021-ийн дагуу, дугаарласан хэсгүүдтэй, товч тодорхой, албан ёсны хэлбэрт бичнэ үү.";
  try{

    if(!apiKey){aiTxt="⚠️ API түлхүүр үг тохируулаагүй байна. Тохиргоо → AI тохиргоо хэсэгт оруулна уу.";out.innerHTML="<div class='aio'>"+aiTxt+"</div>";return;}
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    if(d.error){aiTxt="⚠️ Алдаа: "+JSON.stringify(d.error);out.innerHTML="<div class='aio'>"+aiTxt+"</div>";return;}
    aiTxt=d.content?.[0]?.text||"Хариу алдаа";

  .replace(/#{1,3}\s*/g,"")
  .replace(/\*\*([^*]+)\*\*/g,"$1")

aiTxt=cleanTxt;
out.innerHTML="<div class='aio'>"+aiTxt+"</div><div class='brow'></div>";
    const br=out.lastChild;

async function uploadFile(){
  const name=document.getElementById("fName").value.trim();
  const fileEl=document.getElementById("fFile");
  const res=document.getElementById("upRes");
  if(!name){toast("Нэр оруулна уу","te");return;}
  if(!fileEl.files.length){toast("Файл сонгоно уу","te");return;}
  if(!fbDB||!window._set){toast("Firebase холбогдоогүй","te");return;}
  res.innerHTML="<span style='color:var(--or)'>⏳ Уншиж байна...</span>";
  try{
    await loadSheetJS();
    const file=fileEl.files[0];
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    const sheets={};
    wb.SheetNames.forEach(sn=>{sheets[sn]=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:"",raw:false});});
    const entry={name,filename:file.name,sheets,date:new Date().toLocaleString("mn-MN"),author:S.user.name};
    await window._set(window._r(fbDB,"files/f"+Date.now()),entry);
    res.innerHTML="<span style='color:var(--gr)'>✅ Хадгалагдлаа!</span>";
    document.getElementById("fName").value="";fileEl.value="";
    loadFileList();toast("✅ Файл хадгалагдлаа","ts");
  }catch(e){res.innerHTML="<span style='color:var(--rd)'>❌ Алдаа: "+e.message+"</span>";}
}

async function loadFileList(){
  const el=document.getElementById("fileList");if(!el)return;
  if(!fbDB||!window._get){el.innerHTML="<div class='empty'>Firebase холбогдоогүй</div>";return;}
  el.innerHTML="<div style='color:var(--tx2);font-size:12px;padding:12px'>⏳ Ачаалж байна...</div>";
  try{
    const snap=await window._get(window._r(fbDB,"files"));
    if(!snap.exists()){el.innerHTML="<div class='empty'>Файл байхгүй байна</div>";return;}
    const files=[];snap.forEach(ch=>{files.push({key:ch.key,...ch.val()});});
    files.sort((a,b)=>b.key>a.key?-1:1);
    el.innerHTML="<div style='font-size:13px;font-weight:700;margin:14px 0 10px;color:var(--tx2)'>Хадгалагдсан файлууд ("+files.length+")</div>";
    files.forEach(f=>{
      const d=mk("div");d.style.cssText="background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap";
      const info=mk("div");info.style.flex="1";
      info.innerHTML="<div style='font-weight:600;color:var(--bl2)'>📄 "+f.name+"</div>"
        +"<div style='font-size:11px;color:var(--tx3);margin-top:2px'>"+f.filename+" · "+f.date+" · "+f.author+"</div>"
        +"<div style='font-size:11px;color:var(--tx2);margin-top:2px'>Sheets: "+Object.keys(f.sheets||{}).join(", ")+"</div>";
      d.appendChild(info);
      const bDel=mk("button","btn bd_");bDel.textContent="🗑️";
      bDel.onclick=(()=>{const key=f.key;return async()=>{if(!confirm("Устгах уу?"))return;await window._set(window._r(fbDB,"files/"+key),null);loadFileList();toast("Устгагдлаа","ts");};})();
      d.appendChild(bDel);el.appendChild(d);
    });
  }catch(e){el.innerHTML="<div class='empty'>Алдаа: "+e.message+"</div>";}
}

async function loadFileSelect(){
  const sel=document.getElementById("aFile");if(!sel||!fbDB||!window._get)return;
  try{
    const snap=await window._get(window._r(fbDB,"files"));
    if(!snap.exists())return;
    snap.forEach(ch=>{const f=ch.val();const o=mk("option");o.value=ch.key;o.textContent=f.name+" ("+f.filename+")";sel.appendChild(o);});
  }catch{}
}

function renderArchList(el,items){
  el.innerHTML="";if(!items.length){el.innerHTML="<div class='empty'>Архив хоосон байна</div>";return;}

    d.onclick=(()=>{const aa=a;return()=>{document.getElementById("MC").innerHTML="";const card=mk("div","card");card.innerHTML="<h2>"+aa.plan+" — "+aa.period+"</h2><div class='aio' style='margin-top:10px'>"+aa.text+"</div>";const br=mk("div","brow");const b=mk("button","btn bx");b.textContent="← Буцах";b.onclick=()=>renderTab("archive");br.appendChild(b);card.appendChild(br);document.getElementById("MC").appendChild(card);};})();

  });
}

async function sAllPW(){
