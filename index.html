function fN(v){const n=parseInt((v+"").replace(/,/g,""));return isNaN(n)?"":n.toLocaleString("en-US");}
function fV(v,t){if(v===undefined||v===null||v==="")return"";if(t==="money")return fN(v)+"₮";if(t==="pct")return(parseFloat(v)||0).toFixed(1)+"%";if(t==="text")return v;return fN(v);}
function fmtInput(el){const r=(el.value+"").replace(/[^0-9]/g,"");el.value=r?parseInt(r).toLocaleString("en-US"):"";}
function parseVal(v){return(v+"").replace(/,/g,"");}

function toast(m,c){const t=document.getElementById("tst");t.textContent=m;t.className="toast show "+(c||"");clearTimeout(t._t);t._t=setTimeout(()=>{t.className="toast";},3000);}
function getPer(){
  const n=new Date(),y=n.getFullYear(),m=n.getMonth()+1;
  const w=[],mn=[],q=[];
  // 7 хоног тутам биш өдөр тутам сүүлийн 56 хоногийг нэмнэ — бүх period харагдана
  const seen=new Set();
  for(let i=0;i<56;i++){
    const d=new Date(n);d.setDate(d.getDate()-i);
    const key=d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0")+" 7 хоног";
    if(!seen.has(key)){seen.add(key);w.push(key);}
  }
  for(let i=0;i<6;i++){let mm=m-i,yy=y;if(mm<=0){mm+=12;yy--;}mn.push(yy+" оны "+mm+"-р сар");}
  for(let i=0;i<4;i++){let qq=Math.ceil(m/3)-i,yy=y;if(qq<=0){qq+=4;yy--;}q.push(yy+" оны "+qq+"-р улирал");}
  return{w,mn,q};
}

async function api(action,params){
  // config хадгалахад POST ашиглана (том payload)
  const isLarge=params&&JSON.stringify(params).length>1000;
  if(isLarge){
    // GET-ээр write parameter дамжуулна
    const u=new URL(SU);
    const payload={action,...params};
    u.searchParams.set("write","1");
    u.searchParams.set("payload",JSON.stringify(payload));
    try{
      const r=await fetch(u.toString(),{redirect:"follow"});
      const t=await r.text();
      try{return JSON.parse(t);}catch{return{ok:true};}
    }catch{
      try{await fetch(u.toString(),{mode:"no-cors"});return{ok:true};}catch{return{ok:false};}
    }
  }
  const u=new URL(SU);u.searchParams.set("action",action);
  if(params)for(const[k,v]of Object.entries(params))u.searchParams.set(k,typeof v==="object"?JSON.stringify(v):v);
  try{
    const r=await fetch(u.toString(),{redirect:"follow"});
    const t=await r.text();
    try{return JSON.parse(t);}catch{return{ok:true};}
  }catch{
    try{await fetch(u.toString(),{mode:"no-cors"});return{ok:true};}catch{return{ok:false};}
  }
}

function lockPeriod(){

  if(!freq||!period)return;
  const freqLabel=freq==="week"?"7 Хоног":freq==="month"?"Сар бүр":"Улирал бүр";
  if(!confirm(freqLabel+" — "+period+"\nЭнэ хугацааг хаах уу? Нэгжүүд зөвхөн энэ period-д мэдээ илгээнэ."))return;
  // Хуучин хаалтыг хасаж шинийг нэмнэ
  S.lockedPeriods=S.lockedPeriods.filter(lp=>!lp.active||lp.freq!==freq);
  S.lockedPeriods.push({freq,freq_label:freqLabel,period,active:true,lockedAt:new Date().toLocaleString("mn-MN")});
  try{localStorage.setItem("sga_locked",JSON.stringify(S.lockedPeriods));}catch{}
  // Firebase-д хадгална
  if(fbDB&&window._set){try{window._set(window._r(fbDB,"locked"),S.lockedPeriods);}catch{}}
  toast("🔒 "+period+" хаагдлаа","ts");
  renderTab("monitor");
}

function unlockPeriod(){

  if(activeLocked&&dPer!==activeLocked.period&&!S.user.isAdmin){
    toast("🔒 "+activeLocked.period+" хаалттай — тэр period-д илгээнэ үү","te");
    dPer=activeLocked.period;
    renderTab("data");
    return;
  }
  const inds=S.inds.filter(i=>i.freq===dFreq),vals={};
  inds.forEach(i=>{const el=document.getElementById("v_"+i.id);if(el)vals[i.id]=parseVal(el.value);});
  const entry={unit:S.user.code,unitName:S.user.name,period:dPer,freq:dFreq,values:vals,date:new Date().toLocaleString("mn-MN")};
  const idx=S.data.findIndex(d=>d.unit===entry.unit&&d.period===entry.period&&d.freq===entry.freq);
  if(idx>=0)S.data[idx]=entry;else S.data.push(entry);
  toast("✅ Мэдээ хадгалагдлаа!","ts");
  try{localStorage.setItem("sga_data",JSON.stringify(S.data));}catch{}
  api("saveData",{data:JSON.stringify(entry)});
}

function tChat(c){
  S.unread=0;uBadge(0);
  const card=mk("div","card");card.innerHTML="<h2>💬 Дотоод Чат</h2>";
  const box=mk("div","cbox");box.id="CB";card.appendChild(box);
  const cinp=mk("div","cinp");
  const inp=mk("input");inp.id="CI";inp.placeholder="Мессеж бичнэ...";inp.onkeydown=e=>{if(e.key==="Enter")sMsg();};
  const btn=mk("button","btn bp");btn.textContent="Явуулах";btn.onclick=sMsg;
  cinp.appendChild(inp);cinp.appendChild(btn);
  if(S.user&&S.user.isAdmin){const ab=mk("button","btn bw");ab.textContent="📢 Зар";ab.onclick=sAnn;cinp.appendChild(ab);}
  card.appendChild(cinp);c.appendChild(card);

function renderChatMsgs(){
  const el=document.getElementById("CB");if(!el)return;
  if(!chatMsgs.length){el.innerHTML="<div class='empty'>Мессеж байхгүй</div>";return;}
  el.innerHTML="";
  chatMsgs.slice(-60).forEach(m=>{
    const d=mk("div","msg "+(m.type==="announce"?"ann":m.sender===S.user.code?"mine":"other"));
    if(m.type!=="announce"&&m.sender!==S.user.code){const s=mk("div","msender");s.textContent=m.senderName||m.sender;d.appendChild(s);}
    const txt=document.createElement("span");txt.textContent=(m.type==="announce"?"📢 "+m.senderName+": ":"")+m.text;d.appendChild(txt);
    const mt=mk("div","mtime");mt.textContent=m.time||"";d.appendChild(mt);el.appendChild(d);
  });
  el.scrollTop=el.scrollHeight;
}

async function pollChat(){
  try{
    const r=await api("getChat",{since:chatLastId});
    if(r&&r.msgs&&r.msgs.length){
      r.msgs.forEach(m=>{if(!chatMsgs.find(x=>x.id===m.id))chatMsgs.push(m);});
      chatLastId=r.lastId||chatLastId;
      if(S.tab==="chat")renderChatMsgs();
      else{S.unread+=r.msgs.length;uBadge(S.unread);}
    }
  }catch{}
}

function startChat(){pollChat();if(chatTimer)clearInterval(chatTimer);chatTimer=setInterval(pollChat,10000);}
function stopChat(){if(chatTimer){clearInterval(chatTimer);chatTimer=null;}}

async function sMsg(){
  const inp=document.getElementById("CI");if(!inp||!inp.value.trim())return;
  const msg={sender:S.user.code,senderName:S.user.name,text:inp.value.trim(),time:new Date().toLocaleTimeString("mn-MN"),type:"normal"};
  inp.value="";
  chatMsgs.push({...msg,id:Date.now()});renderChatMsgs();
  try{await api("sendChat",{msg:JSON.stringify(msg)});}catch{}
}
async function sAnn(){
  const txt=prompt("Зарлал:");if(!txt)return;
  const msg={sender:S.user.code,senderName:S.user.name,text:txt,time:new Date().toLocaleTimeString("mn-MN"),type:"announce"};
  chatMsgs.push({...msg,id:Date.now()});renderChatMsgs();
  try{await api("sendChat",{msg:JSON.stringify(msg)});}catch{}
}

function lMon(){
  const per=document.getElementById("mP")?.value,grp=document.getElementById("mG")?.value||"all";
  if(!per)return;
  const NIIS=["ШГА01","ШГА02","ШГА03","ШГА04","ШГА05","ШГА06","ШГА07","ШГА08","ШГА09","ШГА10","ШГА11","ШГА12","ШГА13","ШГА14"];
  let active=S.units.filter(u=>!u.isAdmin&&!u.disabled);
  if(grp==="niislel")active=active.filter(u=>NIIS.includes(u.code));
  else if(grp==="bank")active=active.filter(u=>u.name.includes("Банк"));
  else if(grp==="aimag")active=active.filter(u=>u.name.includes("аймаг"));
  const sub=new Set(S.data.filter(d=>d.period===per&&d.freq===mFreq).map(d=>d.unit));
  const done=active.filter(u=>sub.has(u.code)),miss=active.filter(u=>!sub.has(u.code));
  const pct=active.length?Math.round(done.length/active.length*100):0;
  const el=document.getElementById("mRes");if(!el)return;
  const statsDiv=mk("div","stats");
  [{n:active.length,l:"Нийт нэгж",c:""},{n:done.length,l:"✅ Илгээсэн",c:"g"},{n:miss.length,l:"❌ Илгээгээгүй",c:"r"},{n:pct+"%",l:"Хамрагдалт",c:"o"}].forEach(s=>{
    const sc=mk("div","sc "+(s.c||""));sc.innerHTML="<div class='n'>"+s.n+"</div><div class='l'>"+s.l+"</div>";statsDiv.appendChild(sc);
  });
  el.innerHTML="";el.appendChild(statsDiv);
  const tw=mk("div","tw"),tbl=mk("table");
  const hdr=mk("tr");["Код","Нэгж","Статус","Огноо"].forEach(t=>{const th=mk("th");th.textContent=t;hdr.appendChild(th);});tbl.appendChild(hdr);
  active.forEach(u=>{
    const e=S.data.find(d=>d.unit===u.code&&d.period===per&&d.freq===mFreq);
    const tr=mk("tr");
    const td1=mk("td");td1.innerHTML="<b>"+u.code+"</b>";tr.appendChild(td1);
    const td2=mk("td");
    const sp=mk("span");sp.textContent=u.name;sp.style.cssText="cursor:pointer;color:var(--bl2)";sp.title="Дэлгэрэнгүй";
    sp.onclick=(function(c,n){return function(){showUnitDetail(c,n);};})(u.code,u.name);
    td2.appendChild(sp);tr.appendChild(td2);
    const td3=mk("td");const badge=mk("span","badge "+(e?"bok":"bfail"));badge.textContent=e?"✅ Илгээсэн":"❌ Илгээгээгүй";td3.appendChild(badge);tr.appendChild(td3);
    const td4=mk("td");td4.style.cssText="font-size:12px;color:var(--tx3)";td4.textContent=e?e.date:"";tr.appendChild(td4);
    tbl.appendChild(tr);
  });
  tw.appendChild(tbl);el.appendChild(tw);
  if(miss.length){const md=mk("div");md.style.cssText="margin-top:8px;font-size:12px;color:var(--rd)";md.textContent="❌ "+miss.map(u=>u.code).join(", ");el.appendChild(md);}
}

function lPlanCov(){
  const plan=document.getElementById("mPl")?.value,per=document.getElementById("mPP")?.value;if(!plan||!per)return;
  const inds=S.inds.filter(i=>i.plans&&i.plans.some(pl=>pl.trim()===plan.trim()));
  const el=document.getElementById("pRes");if(!el)return;
  if(!inds.length){el.innerHTML="<div class='empty'>Энэ төлөвлөгөөнд үзүүлэлт байхгүй</div>";return;}
  const planFreq=inds[0].freq;
  const active=S.units.filter(u=>!u.isAdmin&&!u.disabled);
  let tot=0,filled=0,h="<div class='tw'><table><tr><th>Код</th><th>Нэгж</th><th>Дүүрсэн</th><th>Явц</th><th></th></tr>";
  active.forEach(u=>{
    const e=S.data.find(d=>d.unit===u.code&&d.period===per&&d.freq===planFreq);
    const f=inds.filter(i=>e&&e.values&&e.values[i.id]).length;
    tot+=inds.length;filled+=f;const pct=Math.round(f/inds.length*100);
    h+="<tr><td><b>"+u.code+"</b></td><td>"+u.name+"</td><td>"+f+"/"+inds.length+"</td><td><div class='pb'><div class='pf' style='width:"+pct+"%'></div></div> <span style='font-size:11px'>"+pct+"%</span></td><td>"+(e?"<span class='badge bok'>✅</span>":"<span class='badge bfail'>❌</span>")+"</td></tr>";
  });
  h+="</table></div>";
  const oPct=tot?Math.round(filled/tot*100):0;
  el.innerHTML="<div style='margin-bottom:10px;font-size:13px'><b style='color:var(--bl2)'>"+plan+"</b> — Нийт хамрагдалт: <b style='color:"+(oPct>=80?"var(--gr)":"var(--or)")+"'>"+oPct+"%</b></div>"+h;
}

function showUnitDetail(ucode,uname){
  const allEntries=S.data.filter(d=>d.unit===ucode).sort((a,b)=>a.period>b.period?-1:1);
  const overlay=mk("div","modal-overlay");
  const box=mk("div","modal-box");box.style.width="700px";
  box.innerHTML="<h3>📋 "+ucode+" — "+uname+"</h3>";
  if(!allEntries.length){box.innerHTML+="<div class='empty'>Мэдээ байхгүй</div>";}
  else{
    const fmap={"week":"7 Хоног","month":"Сар бүр","quarter":"Улирал бүр"};
    allEntries.forEach(entry=>{
      const sub=mk("div","sub");sub.style.marginBottom="12px";
      sub.innerHTML="<h3>"+(fmap[entry.freq]||entry.freq)+" — "+entry.period+"</h3>";
      const inds=S.inds.filter(i=>i.freq===entry.freq);
      const tbl=mk("table");tbl.style.width="100%";
      tbl.innerHTML="<tr><th style='text-align:left;padding:5px 8px;font-size:11px;color:var(--tx2);border-bottom:1px solid var(--bd)'>Үзүүлэлт</th><th style='text-align:right;padding:5px 8px;font-size:11px;color:var(--tx2);border-bottom:1px solid var(--bd)'>Утга</th></tr>";
      let hasVal=false;
      inds.forEach(ind=>{
        const val=entry.values[ind.id];
        if(!val&&val!==0)return;

function lSum(){
  const from=document.getElementById("sFrom")?.value;
  const to=document.getElementById("sTo")?.value;
  const plan=document.getElementById("sPl")?.value||"all";
  if(!from&&!to)return;
  // Сонгосон хугацааны мужид орох period-ууд
  const P=getPer();
  const sps=sFreq==="week"?P.w:sFreq==="month"?P.mn:P.q;
  let selPeriods=[];
  if(from&&to){
    const fi=sps.indexOf(from),ti=sps.indexOf(to);
    if(fi>=0&&ti>=0)selPeriods=sps.slice(Math.min(fi,ti),Math.max(fi,ti)+1);
    else selPeriods=sps.filter(p=>p===from||p===to);
  } else if(from){selPeriods=[from];}
  else if(to){selPeriods=[to];}
  if(!selPeriods.length)selPeriods=from?[from]:to?[to]:[];
  let inds=S.inds.filter(i=>i.freq===sFreq);
  if(plan!=="all")inds=inds.filter(i=>i.plans&&i.plans.some(pl=>pl.trim()===plan.trim()));
  // Сонгосон бүх period-ийн мэдээг нэгтгэнэ
  const entries=S.data.filter(d=>selPeriods.includes(d.period)&&d.freq===sFreq);
  // Нэгж бүрийг нэг удаа тооцно (хамгийн сүүлийн мэдээг авна)
  const unitMap={};
  entries.forEach(e=>{
    if(!unitMap[e.unit]||e.date>unitMap[e.unit].date)unitMap[e.unit]=e;
  });
  const uniqEntries=Object.values(unitMap);
  const totalU=S.units.filter(u=>!u.isAdmin&&!u.disabled).length;
  const sub=new Set(uniqEntries.map(e=>e.unit)).size;
  const periodLabel=selPeriods.length>1?selPeriods[selPeriods.length-1]+" ~ "+selPeriods[0]:selPeriods[0]||"";
  let h="<div style='font-size:12px;color:var(--tx2);margin-bottom:10px'>📅 "+periodLabel+" ("+selPeriods.length+" хугацаа)</div>";
  h+="<div class='stats'><div class='sc'><div class='n'>"+totalU+"</div><div class='l'>Нийт нэгж</div></div><div class='sc g'><div class='n'>"+sub+"</div><div class='l'>✅ Илгээсэн</div></div><div class='sc r'><div class='n'>"+(totalU-sub)+"</div><div class='l'>❌ Илгээгээгүй</div></div></div>";
  if(!inds.length){document.getElementById("sRes").innerHTML=h+"<div class='empty'>Үзүүлэлт байхгүй</div>";return;}
  h+="<div class='tw'><table><tr><th>ID</th><th>Үзүүлэлт</th><th style='text-align:right'>Нийт</th><th>Бөглөлт</th></tr>";
  inds.forEach(ind=>{
    const vals=uniqEntries.map(e=>e.values[ind.id]).filter(v=>v!==undefined&&v!==null&&v!=="");
    const nums=vals.map(v=>parseFloat((v+"").replace(/,/g,""))).filter(n=>!isNaN(n));
    let total="—";
    if(ind.type==="text"){
      if(vals.length){
        const preview=uniqEntries.filter(e=>e.values[ind.id]).map(e=>"<span style='font-size:11px;color:var(--tx2)'><b>"+e.unit+":</b> "+(String(e.values[ind.id]).length>40?String(e.values[ind.id]).substring(0,40)+"...":e.values[ind.id])+"</span>").join("<br>");
        total="<details><summary style='cursor:pointer;color:var(--bl2)'>"+vals.length+" хариу</summary><div style='margin-top:6px;line-height:1.8'>"+preview+"</div></details>";
      }
    } else if(ind.type==="pct"&&nums.length){total=(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1)+"%";}
    else if(nums.length){total="<b>"+fN(nums.reduce((a,b)=>a+b,0))+"</b>";}
    const fc=vals.length,pct=sub?Math.round(fc/sub*100):0;
    h+="<tr><td style='font-size:12px;color:var(--tx2)'>"+ind.id+"</td><td>"+ind.name+"</td><td style='text-align:right;font-size:15px'>"+total+"</td><td><span style='font-size:12px;color:"+(fc>0?"var(--gr)":"var(--rd)")+"'>"+fc+"/"+sub+"</span> <div class='pb' style='width:60px;display:inline-block;vertical-align:middle'><div class='pf' style='width:"+pct+"%'></div></div></td></tr>";
  });
  h+="</table></div>";
  if(!uniqEntries.length)h+="<div class='empty' style='margin-top:12px'>Мэдээ байхгүй</div>";
  document.getElementById("sRes").innerHTML=h;
}

async function gAI(){
  const plan=document.getElementById("aP")?.value,per=document.getElementById("aPer")?.value,extra=document.getElementById("aEx")?.value||"";
  const out=document.getElementById("aRes");out.innerHTML="<div style='text-align:center;color:var(--tx2);padding:32px'>⏳ AI бичиж байна...</div>";
  const ri=S.inds.filter(i=>i.plans&&i.plans.some(pl=>pl.trim()===plan.trim()));
  const agg={};
  S.units.filter(u=>!u.isAdmin).forEach(u=>{
    const e=S.data.find(d=>d.unit===u.code&&d.period===per);
    if(e)ri.forEach(i=>{if(e.values[i.id]){if(!agg[i.id])agg[i.id]={name:i.name,type:i.type,vals:[]};agg[i.id].vals.push(e.values[i.id]);}});
  });
  const lines=Object.values(agg).map(g=>{const nums=g.vals.map(v=>parseFloat((v+"").replace(/,/g,""))).filter(n=>!isNaN(n));if(g.type==="text")return g.name+": "+g.vals.join("; ");if(nums.length)return g.name+": нийт "+nums.reduce((a,b)=>a+b,0).toLocaleString("en-US");return g.name+": "+g.vals.join(", ");}).join("\n");
  const prompt="Шүүхийн шийдвэр гүйцэтгэх байгууллагын \""+plan+"\" биелэлтийг монгол хэлээр бичнэ үү.\n\nТайлант хугацаа: "+per+"\n\nЦугласан тоон мэдээ:\n"+(lines||"(мэдээ байхгүй)")+"\n\n"+(extra?"Өмнөх загвар:\n"+extra+"\n\n":"")+"\nЧУХАЛ: Markdown (#, ##, **, ---) тэмдэгт огт ашиглахгүй. Цэвэр монгол текстээр, дугаарласан хэсгүүдтэй, албан ёсны хэлбэрт бичнэ үү.";
  try{
    const apiKey=localStorage.getItem("sga_ai_key")||"";
    if(!apiKey){out.innerHTML="<div class='aio'>⚠️ API түлхүүр үг тохируулаагүй. Тохиргоо → AI тохиргоо хэсэгт оруулна уу.</div>";return;}
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1500,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    if(d.error){out.innerHTML="<div class='aio'>⚠️ "+JSON.stringify(d.error)+"</div>";return;}
    aiTxt=(d.content?.[0]?.text||"").replace(/#{1,3}\s*/g,"").replace(/\*\*([^*]+)\*\*/g,"$1").replace(/\*([^*]+)\*/g,"$1").replace(/^---+$/gm,"").trim();
    out.innerHTML="<div class='aio'>"+aiTxt+"</div><div class='brow'></div>";
    const br=out.lastChild;
    const b1=mk("button","btn bs");b1.textContent="✅ Архивлах";b1.onclick=archAI;br.appendChild(b1);
    const b2=mk("button","btn bi");b2.textContent="🖨️ Хэвлэх";b2.onclick=()=>{const p2=document.getElementById("aP")?.value,per2=document.getElementById("aPer")?.value;showPrintModal("",per2||"",[[p2+" биелэлт",aiTxt]]);};br.appendChild(b2);
    const b3=mk("button","btn bx");b3.textContent="📋 Хуулах";b3.onclick=()=>navigator.clipboard.writeText(aiTxt).then(()=>toast("Copied","ts"));br.appendChild(b3);
  }catch(e){out.innerHTML="<div class='aio'>Error: "+e.message+"</div>";}
}

async function uploadFile(){

    const wb=XLSX.read(buf,{type:"array"});
    const sheets={};wb.SheetNames.forEach(sn=>{sheets[sn]=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:"",raw:false});});

  // Төлөвлөгөөнүүд
  const c2=mk("div","card");
  c2.innerHTML="<h2>📋 Төлөвлөгөөнүүд</h2><p style='font-size:12px;color:var(--tx2);margin-bottom:12px'>✅ Идэвхтэй гэж тэмдэглэсэн төлөвлөгөөнүүд нэгжийн мэдээ оруулах хэсэгт харагдана. Хэдийг ч сонгож болно.</p>";
  S.plans.forEach((p,i)=>{
    const row=mk("div","urow");
    // Checkbox
    const cb=mk("input");cb.type="checkbox";cb.style.cssText="width:18px;height:18px;cursor:pointer;accent-color:var(--bl)";
    cb.checked=S.activePlans.includes(p);
    cb.onchange=(function(plan){return function(){
      if(this.checked){if(!S.activePlans.includes(plan))S.activePlans.push(plan);}
      else{S.activePlans=S.activePlans.filter(x=>x!==plan);}
      saveActivePlans();
    };})(p);
    row.appendChild(cb);
    const un=mk("span","un");un.textContent=p;un.style.cursor="pointer";
    un.onclick=()=>{cb.checked=!cb.checked;cb.onchange.call(cb);};
    row.appendChild(un);
    const badge=mk("span","badge "+(S.activePlans.includes(p)?"bok":""));
    badge.textContent=S.activePlans.includes(p)?"✅ Идэвхтэй":"";
    badge.style.minWidth="80px";row.appendChild(badge);
    const bd=mk("button","btn bd_");bd.textContent="🗑️";
    bd.onclick=(function(idx){return function(){if(confirm("Устгах уу?")){S.plans.splice(idx,1);S.activePlans=S.activePlans.filter(x=>x!==S.plans[idx]);savePlans();saveActivePlans();buildCfg(c);}};})(i);
    row.appendChild(bd);c2.appendChild(row);
  });
  const sub2=mk("div","sub");sub2.style.marginTop="10px";sub2.innerHTML="<div class='fr one'><div class='fi'><label>Шинэ төлөвлөгөө</label><input id='nPl' placeholder='Нэр'></div></div>";
  const b2=mk("button","btn bs");b2.textContent="➕ Нэмэх";
  b2.onclick=()=>{const p=document.getElementById("nPl").value.trim();if(!p)return;S.plans.push(p);savePlans();buildCfg(c);};
  sub2.appendChild(b2);c2.appendChild(sub2);c.appendChild(c2);

  // Нууц үгийн удирдлага
  const c3=mk("div","card");c3.innerHTML="<h2>🔐 Нууц үгийн удирдлага</h2>";
  const frp=mk("div","fr");
  const fip1=mk("div","fi");fip1.innerHTML="<label>Бүгдэд нэг нууц үг</label><input id='allPW' placeholder='sga2026'>";frp.appendChild(fip1);
  const fip2=mk("div","fi");fip2.style.cssText="display:flex;align-items:flex-end";
  const ball=mk("button","btn bw");ball.textContent="🔄 Бүгдэд солих";ball.onclick=sAllPW;fip2.appendChild(ball);frp.appendChild(fip2);c3.appendChild(frp);
  const pwList=mk("div");pwList.style.cssText="max-height:300px;overflow-y:auto";
  S.units.filter(u=>!u.isAdmin).forEach(u=>{
    const row=mk("div","urow");
    const uc=mk("span","uc");uc.textContent=u.code;row.appendChild(uc);
    const un=mk("span","un");un.textContent=u.name;row.appendChild(un);
    const pinp=mk("input","pi");pinp.id="pw_"+u.code;pinp.value=S.pwds[u.code]||u.pwd;row.appendChild(pinp);
    const bs=mk("button","btn bs");bs.textContent="💾";
    bs.onclick=(function(code){return async function(){
      const el=document.getElementById("pw_"+code);if(!el)return;
      const pwd=el.value.trim();if(!pwd)return toast("Хоосон","te");
      S.pwds[code]=pwd;try{localStorage.setItem("sga_p",JSON.stringify(S.pwds));}catch{}
      if(fbDB&&window._set){await window._set(window._r(fbDB,"passwords/"+code),pwd);}
    toast("✅ "+code+" нууц үг хадгалагдлаа","ts");
    };})(u.code);row.appendChild(bs);pwList.appendChild(row);
  });c3.appendChild(pwList);c.appendChild(c3);

  // Нэгжийн удирдлага
  const c4=mk("div","card");c4.innerHTML="<h2>🏛️ Нэгжийн удирдлага</h2>";
  const ul=mk("div");ul.style.cssText="max-height:360px;overflow-y:auto";
  S.units.filter(u=>!u.isAdmin).forEach(u=>{
    const row=mk("div","urow");
    const uc=mk("span","uc");uc.textContent=u.code;row.appendChild(uc);
    const un=mk("span","un");un.textContent=u.name;row.appendChild(un);
    const us=mk("span","us "+(u.disabled?"uoff":"uon"));us.textContent=u.disabled?"ХААЛТТАЙ":"НЭЭЛТТЭЙ";row.appendChild(us);
    const be=mk("button","btn bi");be.textContent="✏️";
    be.onclick=(function(unit){return function(){const n=prompt("Нэр:",unit.name);if(n){unit.name=n;buildCfg(c);}};})(u);row.appendChild(be);
    const bt=mk("button","btn "+(u.disabled?"bs":"bw"));bt.textContent=u.disabled?"🔓 Нээх":"🔒 Хаах";
    bt.onclick=(function(unit){return function(){unit.disabled=!unit.disabled;buildCfg(c);};})(u);row.appendChild(bt);ul.appendChild(row);
  });c4.appendChild(ul);
  const sub4=mk("div","sub");sub4.style.marginTop="10px";
  sub4.innerHTML="<h3>➕ Шинэ нэгж</h3><div class='fr'><div class='fi'><label>Нэр</label><input id='nuN' placeholder='Нэр'></div><div class='fi'><label>Нууц үг</label><input id='nuPW' value='sga2026'></div></div><div class='fr one'><div class='fi'><label>Код (хоосон бол автомат)</label><input id='nuC' placeholder='ШГА51...'></div></div>";
  const b4=mk("button","btn bs");b4.textContent="➕ Нэмэх";
  b4.onclick=()=>{
    const n=document.getElementById("nuN").value.trim();if(!n)return toast("Нэр оруулна уу","te");
    const pw=document.getElementById("nuPW").value.trim()||"sga2026";
    let code=document.getElementById("nuC").value.trim();
    if(!code){const nums=S.units.map(u=>parseInt(u.code.replace("ШГА",""))||0);code="ШГА"+(Math.max(...nums)+1);}
    S.units.push({code,name:n,pwd:pw});S.pwds[code]=pw;
    try{localStorage.setItem("sga_p",JSON.stringify(S.pwds));}catch{}
    buildCfg(c);toast("✅ "+code,"ts");
  };sub4.appendChild(b4);c4.appendChild(sub4);c.appendChild(c4);

  // AI тохиргоо
  const c5=mk("div","card");c5.innerHTML="<h2>🤖 AI тохиргоо</h2>";
  const fi5=mk("div","fi");fi5.innerHTML="<label>Anthropic API түлхүүр үг</label>";
  const inp5=mk("input");inp5.type="password";inp5.placeholder="sk-ant-...";inp5.style.cssText="width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:13px";
  inp5.value=localStorage.getItem("sga_ai_key")||"";fi5.appendChild(inp5);c5.appendChild(fi5);
  const bSave=mk("button","btn bs");bSave.style.marginTop="10px";bSave.textContent="💾 Хадгалах";
  bSave.onclick=()=>{const k=inp5.value.trim();if(!k)return toast("API түлхүүр үг оруулна уу","te");localStorage.setItem("sga_ai_key",k);toast("✅ Хадгалагдлаа","ts");};
  c5.appendChild(bSave);c.appendChild(c5);

  // Мэдээ цэвэрлэх
  const c6=mk("div","card");c6.innerHTML="<h2>🗑️ Тест мэдээ цэвэрлэх</h2>";
  const stats=mk("div");stats.style.cssText="background:var(--bg3);border-radius:6px;padding:12px;margin-bottom:14px;font-size:13px";
  stats.innerHTML="Нийт мэдээ: <b style='color:var(--bl2)'>"+S.data.length+"</b> &nbsp;|&nbsp; Нэгж: <b style='color:var(--gr)'>"+new Set(S.data.map(d=>d.unit)).size+"</b>";c6.appendChild(stats);
  const bClear=mk("button","btn bd_");bClear.textContent="🗑️ Бүх мэдээг цэвэрлэх";
  bClear.onclick=()=>{if(!confirm("Бүх "+S.data.length+" мэдээг устгах уу?"))return;S.data=[];try{localStorage.removeItem("sga_data");}catch{}buildCfg(c);toast("✅ Цэвэрлэгдлаа","ts");};
  c6.appendChild(bClear);c.appendChild(c6);
}

async function saveInds(){
  try{localStorage.setItem("sga_inds",JSON.stringify(S.inds));}catch{}
  if(fbDB&&window._set){
    try{await window._set(window._r(fbDB,"config/indicators"),S.inds);}catch{}
  }
  toast("✅ Үзүүлэлтүүд хадгалагдлаа","ts");
}
async function saveActivePlans(){
  try{localStorage.setItem("sga_aplans",JSON.stringify(S.activePlans));}catch{}
  if(fbDB&&window._set){try{await window._set(window._r(fbDB,"activePlans"),S.activePlans);}catch{}}
  toast("✅ Идэвхтэй төлөвлөгөөнүүд хадгалагдлаа","ts");
}
async function savePlans(){
  try{localStorage.setItem("sga_plans",JSON.stringify(S.plans));}catch{}
  try{
    const u=SU+"?action=saveConfig&key=plans&value="+encodeURIComponent(JSON.stringify(S.plans));
    await fetch(u,{redirect:"follow"});
  }catch{}
}
async function sAllPW(){
  const pwd=document.getElementById("allPW").value.trim();if(!pwd)return toast("Оруулна уу","te");
  S.units.filter(u=>!u.isAdmin).forEach(u=>{S.pwds[u.code]=pwd;});
  try{localStorage.setItem("sga_p",JSON.stringify(S.pwds));}catch{}
  // Firebase-д шууд хадгална
  if(fbDB&&window._set){
    try{
      const all={};S.units.filter(u=>!u.isAdmin).forEach(u=>{all[u.code]=pwd;});
      await window._set(window._r(fbDB,"passwords"),all);
      toast("✅ Бүгдийн нууц үг Firebase-д хадгалагдлаа: "+pwd,"ts");
    }catch{toast("✅ Солигдлоо (локал): "+pwd,"ts");}
  } else {
    toast("✅ Солигдлоо (локал): "+pwd,"ts");
  }
  buildCfg(document.getElementById("MC"));
}

window.addEventListener("DOMContentLoaded",initLogin);
</script>
</body>
</html>
